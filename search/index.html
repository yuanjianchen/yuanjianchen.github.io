n> <span class="nav-caret" aria-hidden="true"></span> </button> <div class="nav-menu"> <a href="/m/Maven/">Maven</a> </div> </div><div class="nav-group" data-nav-group> <button type="button" class="nav-group-trigger" aria-expanded="false"> <span>语言</span> <span class="nav-caret" aria-hidden="true"></span> </button> <div class="nav-menu"> <a href="/m/C语言入门手册/">C 语言</a> </div> </div><a href="/m/"> <span>全部分类</span> </a><a href="/archives/"> <span>归档</span> </a><a href="/search/"> <span>搜索</span> </a> </div> <button class="mobile-nav-toggle" type="button" data-mobile-nav-toggle aria-label="打开导航" aria-expanded="false"> <span></span> <span></span> </button> </div> </nav> </header> <main class="site-main">  <section class="search-page"> <div class="page-heading search-heading"> <h1>搜索文章</h1> <span>输入关键词搜索站内文章。</span> </div> <div class="search-panel"> <div id="search" class="pagefind-root"> <div class="empty-state">搜索加载中。</div> </div> <template id="fallback-search-template" data-pagefind-ignore> <div class="fallback-search"> <label class="fallback-search-label" for="fallback-search-input">搜索</label> <input id="fallback-search-input" type="search" placeholder="搜索 Java、JVM、并发、Maven…"> <p class="fallback-search-note" data-fallback-empty>输入关键词开始搜索。</p> <div class="fallback-search-list"> <a href="/post/165052629/" hidden> <strong>深入理解Volatile</strong> <span>并发编程 · 在并发理论基础：Java 内存模型JMM一文中讲到 JMM 模型是 Java 抽象出来的一个概念，用来屏蔽不同硬件和操作系统对于内存访问的差异，让 Java 程序能在不同平台上达到一致的运行效果。规范了 JVM 与计算机内存如何系统工作，规定了一个线程如何和何时可以看到其他线程修改后的共享变量的值，以及如何将共享...</span> </a><a href="/post/165052618/" hidden> <strong>并发理论接触：内存屏障</strong> <span>并发编程 · 为了提高 CPU 的运行效率，现代计算机做了两个方面的优化。一是引入的缓存，二是增加了 CPU 乱序执行指令集。</span> </a><a href="/post/164995635/" hidden> <strong>并发理论基础：Java 内存模型JMM</strong> <span>并发编程 · 在并发理论基础：缓存可见性、MESI一文中分析了缓存可见性导致的并发问题。为了解决缓存可见性问题所以有了缓存一致性协议 MESI，但是MESI的同步等待机制会影响性能，所以用了 storeBuffer 来优化，但是优化过后还是会在一些场景存在可见性问题。这个时候又不能单方面的放弃优化，所以就提供一套内存屏障些指令...</span> </a><a href="/post/164942290/" hidden> <strong>并发理论基础：指令重排序问题</strong> <span>并发编程 · 什么是指令的重排序</span> </a><a href="/post/164926797/" hidden> <strong>并发理论基础：缓存可见性、MESI</strong> <span>并发编程 · 从“ 并发理论基础：并发问题产生的三大根源 ” 文中我们简单的介绍了造成共享变量可见性问题的根源是CPU缓存的问题，那么这里我们再详细的把这个话题展开讨论下，最终计算机领域是如何解决缓存缓存可见性问题的。</span> </a><a href="/post/164913260/" hidden> <strong>并发理论基础：原子性问题</strong> <span>并发编程 · 我们再回顾一下，原子性问题的根源是CPU切换线程执行指令所导致的，当前一个对共享变量的操作没有完成之前，CPU又切换到另外一个线程来操作对应的共享变量，那么最终产生的结果就可能出现问题。</span> </a><a href="/post/164912916/" hidden> <strong>并发理论基础：并发与并行</strong> <span>并发编程 · 并发问题应该算是最让程序员头疼的问题了，无论工作还是面试过程中一谈到并发问题就显得非常高深。随着互联网的普及造成的巨大的用户量，并发问题又无法避免。在我们学习并发编程之前首先要明白什么是编发，了解并发的概念是我们后续学习的基础。</span> </a><a href="/post/164912852/" hidden> <strong>并发理论基础：并发问题产生的三大根源</strong> <span>并发编程 · 在我们去解决并发问题之前首先要理解什么是并发问题，造成并发问题的根源什么，所有并发处理的工具只是针对这些根源问题的其中一种解决方案。所以我们在学习并发解决方案或者编写并发程序时，我们首先要深入理解并发问题的根源是什么。</span> </a><a href="/post/164885530/" hidden> <strong>说一说我理解的Java</strong> <span>基础知识 · 大四校招时第一次接触 Java，了解到 Java 或者说编程也是全靠培训机构，对 Java 的第一印象就是 速成 、高薪, 就业一年就能月薪一万。所以当时就在金钱的诱惑下来到了北京学习 Java 。</span> </a><a href="/post/164885535/" hidden> <strong>Redis入门-Redis概念和基础</strong> <span>Redis · Redis是一种支持key value等多种数据结构的存储系统。可用于缓存，事件发布或订阅，高速队列等场景。支持网络，提供字符串，哈希，列表，队列，集合结构直接存取，基于内存，可持久化。</span> </a><a href="/post/164885534/" hidden> <strong>MySQL数据类型</strong> <span>MySQL · 字段类型</span> </a><a href="/post/164885512/" hidden> <strong>集合框架总览</strong> <span>集合框架 · 知识体系结构</span> </a><a href="/post/164885658/" hidden> <strong>概述</strong> <span>数据结构教程 · 什么是数据结构</span> </a><a href="/post/164885489/" hidden> <strong>八、指针</strong> <span>C语言入门手册 · 指针是 C 中最复杂的部分。</span> </a><a href="/post/164885498/" hidden> <strong>十一、变量作用域</strong> <span>C语言入门手册 · 当你在 C 程序中定义一个变量时，根据你声明它的位置，它会有一个不同的 作用域（scope） 。</span> </a><a href="/post/164885499/" hidden> <strong>十三、命令行参数</strong> <span>C语言入门手册 · 在 C 程序中，你可能需要在命令启动时从命令行接收参数。</span> </a><a href="/post/164885500/" hidden> <strong>十二、类型定义和结构体</strong> <span>C语言入门手册 · C 中的 typedef 关键字允许你定义新的类型。</span> </a><a href="/post/164885501/" hidden> <strong>十五、预处理器</strong> <span>C语言入门手册 · 预处理器是一个工具，当我们用 C 编程时，它对我们有很大的帮助。它是 C 标准的一部分，就像语言本身、编译器和标准库一样。</span> </a><a href="/post/164885502/" hidden> <strong>十四、头文件</strong> <span>C语言入门手册 · 简单的程序可以直接放在单个文件中。但是当你的程序变大，将它放在单个文件中就不可能了。</span> </a><a href="/post/164031793/" hidden> <strong>十、输入与输出</strong> <span>C语言入门手册 · C 是一门小型语言，并且 C 的“内核”并不包含任何输入/输出（I/O）功能。</span> </a><a href="/post/164885483/" hidden> <strong>九、函数</strong> <span>C语言入门手册 · 我们通过函数将代码组织成子例程，这样就可以：</span> </a><a href="/post/164885418/" hidden> <strong>七、字符串</strong> <span>C语言入门手册 · 在 C 中，字符串是一种特殊的数组：字符串是由 char 值组成的数组：</span> </a><a href="/post/164885490/" hidden> <strong>六、数组</strong> <span>C语言入门手册 · 数组是存储多个变量的变量。在 C 中，数组中的每个值都必须有 相同的类型 。</span> </a><a href="/post/164885486/" hidden> <strong>五、循环</strong> <span>C语言入门手册 · C 给我们提供了三种循环： For 循环 、 while 循环 和 do while 循环 。它们都允许在数组上进行迭代，但又各有不同。</span> </a><a href="/post/164885503/" hidden> <strong>四、条件语句</strong> <span>C语言入门手册 · 任何编程语言都给程序员提供了进行选择的能力。我们想要在一些情况下进行 X，而在其它情况下进行 Y。我们想检查数据，根据数据的状态做选择。</span> </a><a href="/post/164885482/" hidden> <strong>三、运算符</strong> <span>C语言入门手册 · C 给我们提供了各种各样的运算符，我们可以用来操作数据。</span> </a><a href="/post/164885485/" hidden> <strong>二、变量与类型</strong> <span>C语言入门手册 · C 是一门静态类型语言。</span> </a><a href="/post/164885416/" hidden> <strong>一、C语言简介</strong> <span>C语言入门手册 · C 可能是最广为人知的编程语言。它被全世界的计算机科学课程中用作参考语言，除了 Python 与 Java，它可能是人们在学校学得最多得编程语言。</span> </a><a href="/post/164885507/" hidden> <strong>对象的创建与死亡以及内存分配、回收机制</strong> <span>JVM · JVM 对象的创建流程,内存分配原则策略以及对象存活判定.</span> </a><a href="/post/164885504/" hidden> <strong>从源码角度理解类加载器</strong> <span>JVM · 类加载器分为 BootstrapClassLoader,ExtClassLoader,AppClassLoader以及自定义类加载器,通过双亲委派模型进行工作,保证了类加载的正确运行.</span> </a><a href="/post/164885659/" hidden> <strong>Feign Api返回值为void时获取 Response信息</strong> <span>OpenFeign · Feign Api怎样获取返回值为void方法的Response信息原理解析,代码跟踪。Feign 利用注解来描述接口，简化了 Java HTTP Client 的调用过程，隐藏了实现细节。</span> </a><a href="/post/164885508/" hidden> <strong>类加载过程</strong> <span>JVM · 类从被加载到虚拟机内容中开始，到卸载出内存为止，它的整个生命周期包括加载、验证、准备、解析、初始化、使用和卸载 7 个阶段</span> </a><a href="/post/164885506/" hidden> <strong>字节码文件结构详解</strong> <span>JVM · Class 类文件的结构,Class文件是一组以 8位字节为基础单位的二进制流，各个数据项目严格按照顺序紧凑地排列在 Class 文件中</span> </a><a href="/post/159683533/" hidden> <strong>JVM内存结构</strong> <span>JVM · jvm内存结构,jvm 运行时数据区域</span> </a><a href="/post/164885517/" hidden> <strong>Maven-POM</strong> <span>Maven · POM Project Object Model，项目对象模型 是 Maven 工程的基本工作单元，是一个XML文件，包含了项目的基本信息，用于描述项目如何构建，声明项目依赖，等等。</span> </a><a href="/post/164885513/" hidden> <strong>Maven-Idea查看解决jar包冲突</strong> <span>Maven · 在实际项目开发过程中，会引用很多的依赖，由于依赖本身也有依赖，如果使用了不同的版本，就会很容易遇到jar包冲突问题，因此，解决jar包冲突问题就显得尤为重要。</span> </a><a href="/post/164885524/" hidden> <strong>Maven-插件</strong> <span>Maven · 认识上述Maven插件的基本概念能帮助你理解Maven的工作机制，不过要想更高效率地使用Maven，了解一些常用的插件还是很有必要的，这可以帮助你避免一不小心重新发明轮子。多年来Maven社区积累了大量的经验，并随之形成了一个成熟的插件生态圈。</span> </a><a href="/post/164885525/" hidden> <strong>Maven-构建生命周期</strong> <span>Maven · Maven 构建生命周期定义了一个项目构建跟发布的过程。我们在开发项目的时候，不断地在编译、测试、打包、部署等过程，maven的生命周期就是对所有构建过程抽象与统一，生命周期包含项目的清理、初始化、编译、测试、打包、集成测试、验证、部署、站点生成等几乎所有的过程。</span> </a><a href="/post/164885526/" hidden> <strong>Maven-约定优于配置</strong> <span>Maven · maven的配置文件看似很复杂，其实只需要根据项目的实际背景，设置个别的几个配置项而已。maven有自己的一套默认配置，使用者除非必要，并不需要去修改那些约定内容。这就是所谓的“约定优于配置”。</span> </a><a href="/post/164885528/" hidden> <strong>Maven-项目模板</strong> <span>Maven · Archetype是一个Maven项目的模板工具包，它定义了一类项目的基本架构。Archetype为开发人员提供了创建Maven项目的模板，同时它也可以根据已有的Maven项目生成参数化的模板。通过Archetype，开发人员可以很方便地将一类项目的最佳实现应用到自己的项目中。在一个Maven项目中，开发者可以通...</span> </a><a href="/post/164885518/" hidden> <strong>Maven-setting-xml</strong> <span>Maven · Maven安装后，用户目录下不会自动生成settings.xml，只有全局配置文件。如果需要创建用户范围的settings.xml，可以将安装路径下的settings复制到目录$ user.home /.m2/。Maven默认的settings.xml是一个包含了注释和例子的模板，可以快速的修改它来达到你的要求。</span> </a><a href="/post/164885520/" hidden> <strong>Maven-仓库</strong> <span>Maven · 在实际项目开发过程中，会引用很多的依赖，由于依赖本身也有依赖，如果使用了不同的版本，就会很容易遇到jar包冲突问题，因此，解决jar包冲突问题就显得尤为重要。</span> </a><a href="/post/164885521/" hidden> <strong>Maven-依赖关系</strong> <span>Maven · 依赖关系是最常用的一种，就是你的项目需要依赖其他项目，比如Apache common包，Spring包等等。任意一个外部依赖说明包含如下几个要素：groupId, artifactId, version, scope, type, optional。其中前3个是必须的。</span> </a><a href="/post/164885522/" hidden> <strong>Maven-初识</strong> <span>Maven · Maven是一个项目管理工具，它包含了一个项目对象模型 POM：Project Object Model ，一组标准集合，一个项目生命周期 Project Lifecycle ，一个依赖管理系统 Dependency Management System ，和用来运行定义在生命周期阶段 phase 中插件 plug...</span> </a><a href="/post/164885523/" hidden> <strong>Maven-命令</strong> <span>Maven · 作为开发利器的maven，为我们提供了十分丰富的命令，了解maven的命令行操作并熟练运用常见的maven命令还是十分必要的，即使譬如IDEA等工具给我提供了图形界面化工具，但其底层还是依靠maven命令来驱动的。因此，知其然，知其所以然，方能百战不殆。</span> </a><a href="/post/164885719/" hidden> <strong>设计模式 - 简单工厂模式</strong> <span>设计模式 · 简单工厂模式又称为静态工厂方法模式，它属于类创建型模式。在简单工厂模式中，可以根据参数的不同返回不同类的实例。简单工厂模式专门定义一个类来负责创建其他类的实例，被创建的实例通常都具有共同的父类。</span> </a><a href="/post/164885661/" hidden> <strong>设计模式 - 单例模式</strong> <span>设计模式 · 通常我们可以让一个全局变量使得一个对象被访问，但它不能防止你实例化多个对象。一个最好的办法就是让类自身负责保存它的唯一实例。这个类可以保证没有其它实例可以被创建,并且它可以提供一个访问该实例的方法</span> </a><a href="/post/164885720/" hidden> <strong>设计模式 - 工厂方法模式</strong> <span>设计模式 · 工厂方法模式是类的创建模式，又叫虚拟构造器（Virtual Constructor）模式，或者多态性工厂模式。定义一个创建对象的接口，让子类决定实例化哪一个类。工厂方法使一个类的实例化延迟到其子类。</span> </a><a href="/post/164885663/" hidden> <strong>设计模式 - 工厂三兄弟</strong> <span>设计模式 · 简单工厂模式、工厂方法模式、抽象工厂模式都属于创建型模式。这三个模式都是为了解决对象的创建而生。这三个工厂模式就像孪生兄弟一样，总是让人傻傻分不清楚。今天就依据个人理解对三个模式总结对比一下。</span> </a><a href="/post/164885722/" hidden> <strong>设计模式 - 抽象工厂</strong> <span>设计模式 · 所谓的抽象工厂是指一个工厂等级结构可以创建出分属于不同产品等级结构的一个产品族中的所有对象。抽象工厂设计模式包含 抽象工厂、具体工厂、抽象产品、具体产品等四个角色</span> </a><a href="/post/164885718/" hidden> <strong>设计模式 - 概述</strong> <span>设计模式 · 单一职权原则、里氏替换原则、依赖倒置原则、接口隔离原则、迪米特法则、开闭原则。设计模式并不是固定的一套代码，而是针对某一特定问题的具体解决思路与方案。可以认为是一种最佳实践，因为他是无数软件开发人员经过长时间的实践总结出来的。</span> </a><a href="/post/164885660/" hidden> <strong>UML 类图</strong> <span>设计模式 · UML，统一建模语言「Unified Modeling Language」，是非专利的第三代建模和规约语言。UML是一种开放的方法，用于说明、可视化、构建和编写一个正在开发的、面向对象的、软件密集系统的制品的开放方法。UML展现了一系列最佳工程实践，这些最佳实践在对大规模，复杂系统进行建模方面，特别是在软件架构层...</span> </a><a href="/post/164885511/" hidden> <strong>数组</strong> <span>基础知识 · 数组是编程语言中最常见的一种数据结构,可以用于储存多个数据,通常可通过数组元素的索引来访问数组元素,包括数组元素赋值和取出数组元素的值.</span> </a><a href="/post/164885509/" hidden> <strong>原码、补码、反码</strong> <span>基础知识 · 有数字在计算机底层都是以二进制形式存在的.它的表现形式叫做机器数,这个数有正负之分,最高位为符号位.0 表示正数, 1 表示负数.</span> </a><a href="/post/164885510/" hidden> <strong>Java基础 - 数据类型和运算符</strong> <span>基础知识 · Java 的基本数据类型分为两类:基本数据类型、引用类型。一个 byte 类型在内存中占 8 位（1字节）范围 128 2^7 127 2^7 1</span> </a> </div> </div> </template> </div> </section> <script type="module">async function d(){return window.PagefindUI||await new Promise((n,l)=>{const a=document.createElement("link");a.rel="stylesheet",a.href="/pagefind/pagefind-ui.css",document.head.append(a);const r=document.createElement("script");r.src="/pagefind/pagefind-ui.js",r.onload=()=>n(),r.onerror=()=>l(new Error("搜索暂时不可用，请稍后再试。")),document.head.append(r)}),window.PagefindUI}const t=document.querySelector("#search");t&&d().then(n=>{if(!n)throw new Error("Pagefind UI is unavailable.");t.replaceChildren(),new n({element:"#search",showSubResults:!0,resetStyles:!1,translations:{placeholder:"搜索 Java、JVM、并发、Maven…",clear_search:"清空",load_more:"加载更多",search_label:"搜索文章",filters_label:"筛选",zero_results:"没有找到结果。可以换一个关键词再试。",many_results:"[COUNT] 个结果",one_result:"[COUNT] 个结果",searching:"搜索中…"}}),document.querySelector(".pagefind-ui__search-input")?.focus()}).catch(n=>{const l=document.querySelector("#fallback-search-template");if(!l){const e=document.createElement("div");e.className="empty-state",e.textContent=n.message,t.replaceChildren(e);return}t.replaceChildren(l.content.cloneNode(!0));const a=t.querySelector("#fallback-search-input"),r=[...t.querySelectorAll(".fallback-search-list a")],c=t.querySelector("[data-fallback-empty]");a?.addEventListener("input",()=>{const e=a.value.trim().toLowerCase();let o=0;for(const s of r){const i=e.length>0&&!!s.textContent?.toLowerCase().includes(e);s.hidden=!i,i&&(o+=1)}c&&(c.textContent=e.length===0?"输入关键词开始搜索。":
